# Render Blueprint — https://render.com/docs/blueprint-spec
# Free Render accounts are limited to ONE PostgreSQL database.
# Reuse an existing database and set DATABASE_URL in the Render dashboard BEFORE deploying.
# Schema sync runs at service start (not build) when DATABASE_URL is available.
# After deploy, set CORS_ORIGIN to your Vercel URL(s), comma-separated.
# Optional: run `npm run db:seed -w @agbms/api` once from the Render Shell.

services:
  - type: web
    name: afc-management-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npm run build:api:deploy
    startCommand: npm run start -w @agbms/api
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
