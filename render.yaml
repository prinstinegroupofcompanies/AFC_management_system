# Render Blueprint — https://render.com/docs/blueprint-spec
#
# DATABASE: Do NOT create a new free Postgres here (Render allows only one).
# After the web service is created, link your existing database:
#   Postgres dashboard -> Connect -> afc-management-api
# Or set DATABASE_URL manually under Environment.
#
# After deploy, set CORS_ORIGIN to your Vercel URL(s), comma-separated.
# Seed once from Render Shell: npm run db:seed -w @agbms/api

services:
  - type: web
    name: afc-management-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npm run build:api:deploy
    startCommand: npm run start -w @agbms/api
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
