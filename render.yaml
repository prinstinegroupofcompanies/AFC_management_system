# Render Blueprint — https://render.com/docs/blueprint-spec
# After deploy, set CORS_ORIGIN to your Vercel URL(s), comma-separated.
# Optional: run `npm run db:seed -w @agbms/api` once from the Render Shell.

databases:
  - name: agbms-db
    plan: free
    databaseName: agbms
    user: agbms

services:
  - type: web
    name: afc-management-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npm run build:api:deploy
    startCommand: npm run start -w @agbms/api
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: agbms-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
