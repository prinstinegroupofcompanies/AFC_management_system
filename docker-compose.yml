services:
  postgres:
    image: postgres:16-alpine
    container_name: agbms-postgres
    environment:
      POSTGRES_USER: agbms
      POSTGRES_PASSWORD: agbms123
      POSTGRES_DB: agbms
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
